version: "2"
name: "Slack Surface"
description: "DevRev snap-in that integrates Slack with DevRev AI Agents. Receives messages from Slack, processes them through AI Agents, and sends responses back."

service_account:
  display_name: Slack Surface Bot
  scopes:
    self:
      - scope: dev_user:read
        optional: false
        reason: "Resolve the Slack sender's email to a DevRev user via /dev-users.list?email= before minting an act-as token. Read-only — never creates or updates dev users."
      - scope: ai_agent:execute
        optional: false
        reason: "Fallback path: when no DevU is resolvable for the Slack sender, the SA token calls /internal/ai-agents.events.execute-async directly to run the AI Agent."
      - scope: tenant_fragment:write
        optional: false
        reason: "Activate hook calls /schemas.custom-set with type=TenantFragment to attach Slack session fields to the built-in conversation leaf type."
      - scope: conversation:read
        optional: false
        reason: "List/get DevRev conversations to look up the active Slack ↔ DevRev session by conversation_key + status."
      - scope: conversation:write
        optional: false
        reason: "Create/update/delete conversations as the persistent backing store for Slack ↔ DevRev AI sessions, and append timeline entries mirroring user queries and AI Agent responses."
    impersonate:
      - act_as: all_devusers
        scopes:
          - scope: ai_agent:execute
            optional: false
            reason: "Run AI Agent on behalf of the resolved Dev user via /internal/ai-agents.events.execute-async after minting an act-as token."
          - scope: conversation:write
            optional: false
            reason: "Delete or update conversations during session GC when acting as the original session owner."
          - scope: conversation:read
            optional: false
            reason: "Look up conversation status when sweeping sessions on behalf of the user."

inputs:
  organization:
    - name: ai_agent_id
      field_type: text
      is_required: true
      default_value: ""
      description: The ID of the DevRev AI Agent to use for processing messages.
      ui:
        display_name: AI Agent ID

    - name: mock_email_address
      field_type: text
      is_required: false
      default_value: ""
      description: "If you have a DevRev email ID which you wish to mock in any surface, then enter it here. If it is a valid email address then it will appear as if the messages are coming from you from any surface such as Slack or Teams. If email address is not present, then this will be ignored."
      ui:
        display_name: Mock Email Address (Testing)

    - name: session_idle_timeout_minutes
      field_type: int
      is_required: false
      default_value: 480
      description: Minutes of user inactivity before a session is considered idle-expired (default 480 = 8h). At this point the user is told their session has expired; the conversation is kept until the absolute timeout passes.
      ui:
        display_name: Session idle timeout (minutes)

    - name: session_absolute_timeout_hours
      field_type: int
      is_required: false
      default_value: 24
      description: Absolute lifetime of a session in hours (default 24). Conversations are deleted from DevRev after this elapses, regardless of activity.
      ui:
        display_name: Session absolute timeout (hours)

keyrings:
  organization:
    - name: slack_bot_token
      display_name: Slack Bot Token
      description: The Bot User OAuth Token from your Slack App (starts with xoxb-).
      types:
        - snap_in_secret

    - name: slack_signing_secret
      display_name: Slack Signing Secret
      description: The Signing Secret from your Slack App's Basic Information page. Used to verify requests from Slack.
      types:
        - snap_in_secret

event_sources:
  organization:
    - name: slack-webhook-source
      description: Single Slack webhook — receives Events API, slash commands, and Block-Kit interactivity.
      display_name: Slack Webhook
      type: flow-custom-webhook
      config:
        policy: |
          package rego

          import future.keywords.if

          # URL verification — answered inline so the Slack Events
          # setup flow succeeds. Body must be an object for `.type` to
          # be valid in Rego; guard explicitly.
          output = {"response": response} if {
            is_object(input.request.body)
            input.request.body.type == "url_verification"
            response := {
              "status_code": 200,
              "body": {"challenge": input.request.body.challenge},
              "headers": {"Content-Type": "application/json"}
            }
          }

          # Events API JSON callbacks (app_mention, message.im, etc.)
          # → slack_handler.
          output = {"event": event, "event_key": "slack-message"} if {
            input.request.method == "POST"
            is_object(input.request.body)
            input.request.body.type == "event_callback"
            event := {
              "body": input.request.body,
              "body_raw": input.request.body_raw,
              "headers": input.request.headers
            }
          }

          # Slash commands & Block-Kit interactivity → slack_interactivity.
          # Catches every POST that isn't an Events JSON callback or a URL
          # verification, regardless of body shape.
          output = {"event": event, "event_key": "slack-interactivity"} if {
            input.request.method == "POST"
            not is_event_callback
            not is_url_verification
            event := {
              "body": input.request.body,
              "body_raw": input.request.body_raw,
              "headers": input.request.headers
            }
          }

          is_event_callback if {
            is_object(input.request.body)
            input.request.body.type == "event_callback"
          }

          is_url_verification if {
            is_object(input.request.body)
            input.request.body.type == "url_verification"
          }
      setup_instructions: |
        ## Slack App Setup

        **Your Request URL** (use the same URL everywhere below):

        `{{ source.trigger_url }}`

        1. Create a Slack App at [api.slack.com/apps](https://api.slack.com/apps):
           - Click "Create New App" > "From scratch"
           - Name your app and select your workspace

        2. Configure Bot Token Scopes (OAuth & Permissions):
           - `chat:write` - Send and update messages
           - `users:read` - Get user information
           - `users:read.email` - Access user email addresses
           - `app_mentions:read` - Receive @mentions
           - `commands` - Required for the `/sda-feedback` slash command

        3. Enable Event Subscriptions:
           - Turn on "Enable Events"
           - Paste the Request URL above
           - Subscribe to bot events: `app_mention`
           - Optionally add: `message.im` for direct messages

        4. Slash Commands → Create New Command:
           - Command: `/sda-feedback`
           - Paste the same Request URL above
           - Short description: "Share feedback on the SDA Agent"

        5. Interactivity & Shortcuts:
           - Toggle Interactivity ON
           - Paste the same Request URL above

        6. Install the app to your workspace:
           - Go to "Install App" and click "Install to Workspace"
           - Copy the **Bot User OAuth Token** (starts with `xoxb-`)

        7. Get the Signing Secret:
           - Go to "Basic Information"
           - Copy the **Signing Secret**

        8. Enter both tokens during snap-in installation.

    # Native DevRev event source for AI Agent responses
    - name: ai-agent-events
      description: Receives AI Agent response events directly from DevRev.
      display_name: AI Agent Events
      type: devrev-webhook
      config:
        event_types:
          - ai_agent_response

    - name: session-gc-timer
      description: Cron-driven periodic sweeper for Slack session conversations.
      display_name: Session GC Timer
      type: timer-events
      config:
        cron: "*/30 * * * *"
        metadata:
          event_key: session-gc-tick

functions:
  - name: slack_handler
    description: Handles incoming messages from Slack and forwards them to AI Agents.

  - name: slack_interactivity
    description: Handles Slack Block-Kit button clicks and modal submissions (e.g. the feedback form).

  - name: ai_response_handler
    description: Handles async responses from AI Agents and sends them back to Slack.

  - name: ensure_session_state_schema
    description: Creates or updates the tenant-fragment schema that attaches Slack session fields to the built-in conversation leaf type.

  - name: session_gc
    description: Periodic sweeper. Marks idle-expired sessions and deletes conversations past the absolute timeout.

hooks:
  - type: activate
    function: ensure_session_state_schema

automations:
  - name: handle-slack-message
    description: Process incoming Slack messages
    source: slack-webhook-source
    event_types:
      - custom:slack-message
    function: slack_handler

  - name: handle-slack-interactivity
    description: Process Slack slash commands and Block-Kit interactions (buttons, modals)
    source: slack-webhook-source
    event_types:
      - custom:slack-interactivity
    function: slack_interactivity

  - name: handle-ai-response
    description: Process AI Agent responses and send to Slack
    source: ai-agent-events
    event_types:
      - ai_agent_response
    function: ai_response_handler

  - name: run-session-gc
    description: Run periodic session garbage collection
    source: session-gc-timer
    event_types:
      - timer.tick
    function: session_gc
